services:
  - type: web
    name: llm-app-backend
    env: python
    pythonVersion: 3.11
    plan: free
    autoDeploy: true
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: API_KEY
        generateValue: true
